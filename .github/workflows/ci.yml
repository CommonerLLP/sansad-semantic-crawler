name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[pdf,http]"
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Version consistency check
        run: |
          PKG=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          INIT=$(grep '^__version__' sansad_semantic_crawler/__init__.py | sed 's/.*= *"\(.*\)"/\1/')
          echo "pyproject.toml: $PKG  __init__.py: $INIT"
          [ "$PKG" = "$INIT" ] || { echo "Version mismatch"; exit 1; }

  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Run leak check on tracked files
        run: python3 scripts/check_leaks.py --tracked
