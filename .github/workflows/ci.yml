name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[pdf,http]"
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Version consistency check
        run: |
          PKG=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          INIT=$(python -c "import re; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('sansad_semantic_crawler/__init__.py').read()); print(m.group(1))")
          echo "pyproject.toml: $PKG  __init__.py: $INIT"
          [ "$PKG" = "$INIT" ] || { echo "Version mismatch"; exit 1; }

  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Run leak check on tracked files
        run: python3 scripts/check_leaks.py --tracked
